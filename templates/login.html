<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShipTrack Pro — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body class="login-page">
  <div class="login-grid-bg"></div>
  <div class="login-wrapper">
    <div class="login-brand">
      <div class="brand-icon">⬡</div>
      <h1 class="brand-name">ShipTrack<span>Pro</span></h1>
      <p class="brand-tagline">Supply Chain Intelligence Platform</p>
    </div>
    <div class="login-card">
      <h2>Sign In</h2>
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="alert">{{ messages[0] }}</div>
        {% endif %}
      {% endwith %}
      <form method="POST">
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" placeholder="Enter username" required/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="Enter password" required/>
        </div>
        <button type="submit" class="btn-login">Access Dashboard →</button>
      </form>
      <p class="login-hint">Demo: <strong>admin</strong> / <strong>admin123</strong></p>
    </div>
  </div>
</body>
</html>
